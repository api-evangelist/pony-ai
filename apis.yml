aid: pony-ai
name: Pony.ai
description: >-
  Pony.ai is a global autonomous-mobility company founded in Silicon Valley in
  2016 and dual-headquartered in Guangzhou and Fremont. Its core technology is
  the Pony "virtual driver", a Level 4 autonomous driving stack deployed across
  three business lines: Robotaxi (PonyPilot+ ride-hailing service operating in
  Beijing, Shanghai, Guangzhou, and Shenzhen, plus pilots in California and
  Arizona), Robotruck (autonomous heavy-duty trucking in China), and Personally
  Owned Vehicle (POV) intelligent driving software for production passenger
  cars. The company is publicly listed on NASDAQ under PONY and reports more
  than 32 million kilometres of autonomous road testing. Pony.ai does not
  publish a traditional public developer API; its public GitHub presence
  includes infrastructure tooling such as pony_aim (experiment tracker) and
  bazel-buildfarm rather than the AV stack itself. This profile captures the
  company surface and any developer-relevant artifacts.
